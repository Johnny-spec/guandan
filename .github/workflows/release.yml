name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/guandan

jobs:
  build-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        include:
          - app: game-server
            context: .
            dockerfile: apps/game-server/Dockerfile
          - app: teams-tab
            context: .
            dockerfile: apps/teams-tab/Dockerfile
          - app: ai-service
            context: apps/ai-service
            dockerfile: apps/ai-service/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
          provenance: true
          sbom: true

  deploy:
    name: Deploy to AKS (canary)
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RG }}
          cluster-name:   ${{ secrets.AKS_NAME }}
      - name: Apply manifests
        run: kubectl apply -f infrastructure/k8s/
      - name: Roll out new images
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          kubectl -n guandan set image deploy/game-server game-server=ghcr.io/${{ github.repository_owner }}/guandan-game-server:$TAG
          kubectl -n guandan set image deploy/teams-tab  teams-tab=ghcr.io/${{ github.repository_owner }}/guandan-teams-tab:$TAG
          kubectl -n guandan set image deploy/ai-service ai-service=ghcr.io/${{ github.repository_owner }}/guandan-ai-service:$TAG
          kubectl -n guandan rollout status deploy/game-server --timeout=5m
          kubectl -n guandan rollout status deploy/teams-tab  --timeout=5m
          kubectl -n guandan rollout status deploy/ai-service --timeout=5m
