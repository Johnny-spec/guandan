# 单机/本地一体化栈。生产请用 K8s（infrastructure/k8s/）。
# 用法：
#   docker compose up -d                       # 仅核心服务
#   docker compose --profile obs up -d         # 含监控（Prometheus/Grafana/Loki/OTel）

x-restart: &restart
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    <<: *restart
    environment:
      POSTGRES_USER: guandan
      POSTGRES_PASSWORD: guandan
      POSTGRES_DB: guandan
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "guandan"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    <<: *restart
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  game-server:
    build:
      context: .
      dockerfile: apps/game-server/Dockerfile
    <<: *restart
    env_file: .env
    environment:
      DATABASE_URL: postgresql://guandan:guandan@postgres:5432/guandan
      REDIS_URL: redis://redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["3001:3001"]
    deploy:
      replicas: 1
      resources:
        limits: { cpus: "1.0", memory: "512M" }

  teams-tab:
    build:
      context: .
      dockerfile: apps/teams-tab/Dockerfile
    <<: *restart
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://nginx/api
      NEXT_PUBLIC_SOCKET_URL: http://nginx
    depends_on: [game-server]
    ports: ["3000:3000"]

  ai-service:
    build: { context: ./apps/ai-service }
    <<: *restart
    env_file: .env
    ports: ["8000:8000"]

  nginx:
    image: nginx:1.27-alpine
    <<: *restart
    depends_on: [game-server, teams-tab]
    ports: ["80:80"]
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro

  # ===== observability profile =====
  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: [obs]
    <<: *restart
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [obs]
    <<: *restart
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./infrastructure/docker/grafana-datasources.yml:/etc/grafana/provisioning/datasources/ds.yml:ro
      - grafanadata:/var/lib/grafana
    ports: ["3002:3000"]
    depends_on: [prometheus, loki]

  loki:
    image: grafana/loki:3.2.0
    profiles: [obs]
    <<: *restart
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./infrastructure/docker/loki-config.yml:/etc/loki/local-config.yaml:ro
      - lokidata:/loki
    ports: ["3100:3100"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    profiles: [obs]
    <<: *restart
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infrastructure/docker/otel-collector.yml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "8889:8889"  # Prometheus exporter

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:
  lokidata:
