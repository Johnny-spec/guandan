events {}

http {
  upstream game_server { server game-server:3001; }
  upstream teams_tab   { server teams-tab:3000;  }

  server {
    listen 80;

    location /socket.io/ {
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_pass http://game_server;
    }

    location /api/ {
      proxy_pass http://game_server;
    }

    location / {
      proxy_pass http://teams_tab;
    }
  }
}
