apiVersion: v1
kind: ConfigMap
metadata: { name: app-config, namespace: guandan }
data:
  NODE_ENV: production
  REDIS_URL: redis://redis:6379
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.observability:4318
---
# 由 Key Vault CSI driver 或 External Secrets 同步实际值。
apiVersion: v1
kind: Secret
metadata: { name: app-secrets, namespace: guandan }
type: Opaque
stringData:
  DATABASE_URL: postgresql://guandan:CHANGE_ME@postgres:5432/guandan
  TEAMS_APP_ID: CHANGE_ME
  TEAMS_APP_PASSWORD: CHANGE_ME
  ENTRA_TENANT_ID: CHANGE_ME
